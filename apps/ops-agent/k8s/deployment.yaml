# ServiceAccount used by the Ops Agent pod. Annotated for Azure AD Workload
# Identity: the federated credential on the User-Assigned Managed Identity
# (UAMI) trusts this (namespace, serviceaccount) pair. The annotation value
# `${UAMI_CLIENT_ID}` is substituted at deploy time by scripts/deploy-k8s.ps1.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ops-agent-sa
  namespace: default
  annotations:
    azure.workload.identity/client-id: "${UAMI_CLIENT_ID}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ops-agent
  namespace: default
  labels:
    app: ops-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ops-agent
  template:
    metadata:
      labels:
        app: ops-agent
        # Required (string "true") so the Workload Identity admission webhook
        # injects the projected service-account token volume + AZURE_* env vars.
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: ops-agent-sa
      containers:
        - name: ops-agent
          # Image reference; `${ACR_LOGIN_SERVER}` is substituted at deploy time.
          image: ${ACR_LOGIN_SERVER}/ops-agent:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 9000
              protocol: TCP
          env:
            # --- Static config (no substitution) ---
            - name: AZURE_OPENAI_API_VERSION
              value: "2025-03-01-preview"
            - name: DATA_DIR
              value: "/srv/data"
            # --- Substituted by deploy script ---
            - name: OPS_AGENT_PUBLIC_URL
              value: "https://ops-agent.${DNS_ZONE}/"
            - name: AZURE_OPENAI_ENDPOINT
              # Foundry account inference endpoint (Azure OpenAI-compatible).
              # Set from main.bicep output `accountInferenceEndpoint`.
              # Example: https://foundry-zava-demo.services.ai.azure.com
              value: "${FOUNDRY_ACCOUNT_ENDPOINT}"
            - name: FOUNDRY_PROJECT_ENDPOINT
              # Foundry V2 project endpoint (Responses API / AIProjectClient).
              # Kept for future use (e.g., if we switch to AIProjectClient.get_openai_client()).
              value: "${FOUNDRY_ENDPOINT}"
            - name: AZURE_OPENAI_DEPLOYMENT
              value: "${WORKER_DEPLOYMENT_NAME}"
            # UAMI client ID — also injected by the Workload Identity webhook,
            # but set explicitly here for clarity / parity with local dev.
            - name: AZURE_CLIENT_ID
              value: "${UAMI_CLIENT_ID}"
            # --- From Secret (created imperatively, see k8s/secret.template.yaml) ---
            - name: A2A_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ops-agent-secrets
                  key: A2A_API_KEY
          livenessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
