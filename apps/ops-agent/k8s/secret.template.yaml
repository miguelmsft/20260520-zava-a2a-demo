# =============================================================================
# DO NOT apply this manifest directly.
#
# The actual `ops-agent-secrets` Kubernetes Secret is created **imperatively**
# by `scripts/deploy-k8s.ps1` (Step 15) using a freshly-generated random key:
#
#   $A2A_API_KEY = [Convert]::ToBase64String((1..32 | ForEach-Object {
#       Get-Random -Minimum 0 -Maximum 256 }))
#   kubectl create secret generic ops-agent-secrets `
#       --from-literal=A2A_API_KEY=$A2A_API_KEY `
#       --dry-run=client -o yaml | kubectl apply -f -
#
# (Equivalent on bash: `openssl rand -base64 32`.)
#
# This file documents the expected schema only — committing real key material
# to the repo would defeat the purpose of using a Secret.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: ops-agent-secrets
  namespace: default
type: Opaque
stringData:
  # 32+ bytes of random material, base64-encoded as a string. Consumed by the
  # ops-agent Deployment via secretKeyRef. Both this value and the Foundry-side
  # A2A connection's API key header MUST be identical.
  A2A_API_KEY: "<REPLACE_AT_DEPLOY_TIME>"
